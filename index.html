<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الرئيسية - نادي Al-Rajaa Club</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 2px solid #3b82f6;
        }

        .logo-area img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            background-color: #ffffff;
            object-fit: cover;
        }

        h1 {
            color: #3b82f6;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 35px;
            font-size: 1.05rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: #3b82f6;
            color: #ffffff;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            text-decoration: none;
            display: block;
            width: 100%;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .btn-fan {
            background-color: #0ea5e9;
        }

        .btn-fan:hover {
            background-color: #0284c7;
        }

        .btn-admin {
            background-color: #64748b;
        }

        .btn-admin:hover {
            background-color: #475569;
        }

        .btn-install {
            background-color: #10b981;
            display: none; /* يظهر تلقائياً عندما يدعم الجهاز التثبيت */
            margin-top: 5px;
        }

        .btn-install:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <img src="icon-192.png" alt="شعار النادي">
        </div>

        <h1>Al-Rajaa Club</h1>
        <p>اختر لوحة التحكم الخاصة بك للبدء</p>

        <div class="btn-group">
            <a href="fan-login.html" class="btn btn-fan">دخول المشجعين</a>
            <a href="player-login.html" class="btn">دخول اللاعبين</a>
            <a href="admin-dashboard.html" class="btn btn-admin">لوحة تحكم الإدارة</a>
            
            <button id="installBtn" class="btn btn-install">📥 تثبيت التطبيق</button>
        </div>
    </div>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            // منع المتصفح من إظهار الرسالة التلقائية
            e.preventDefault();
            deferredPrompt = e;
            
            // إظهار الزر
            const installBtn = document.getElementById('installBtn');
            installBtn.style.display = 'block';

            installBtn.addEventListener('click', () => {
                installBtn.style.display = 'none';
                deferredPrompt.prompt();
                
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                });
            });
        });

        // تسجيل الـ Service Worker لعمل التطبيق
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker Registered!', reg);
                }).catch(err => {
                    console.log('Service Worker Failed to Register: ', err);
                });
            });
        }
    </script>

</body>
</html>
