<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق نادي Al-Rajaa Club</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 2px solid #3b82f6;
        }

        .logo-area img {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            background-color: #ffffff;
            object-fit: cover;
        }

        h1 {
            color: #3b82f6;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: #3b82f6;
            color: #ffffff;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
        }

        .btn-secondary:hover {
            background-color: #334155;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-area">
            <img src="icon-192.png" alt="شعار النادي">
        </div>
        
        <h1>Al-Rajaa Club</h1>
        <p>اختر لوحة التحكم للبدء</p>

        <div class="btn-group">
            <button class="btn" onclick="window.location.href='player-login.html'">دخول كلاعب</button>
            <button class="btn" onclick="window.location.href='fan-login.html'">دخول كمشجع</button>
            <button class="btn btn-secondary" onclick="window.location.href='admin-login.html'">دخول الإدارة (Admin)</button>
        </div>
    </div>

</body>
</html>
