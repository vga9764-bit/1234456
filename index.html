<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Al-Rajaa Club</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 2px solid #3b82f6;
        }

        .logo-area img {
            width: 120px;
            height: 120px;
            margin-bottom: 25px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            object-fit: cover;
            background-color: #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .welcome-message {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background-color: #3b82f6;
            color: #ffffff;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #000000;
            border: 1px solid #3b82f6;
            color: #3b82f6;
        }

        .btn-secondary:hover {
            background-color: #111827;
            color: #60a5fa;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <img src="icon-192.png" alt="شعار نادي الرجاء العراقي">
        </div>

        <div class="welcome-message">
            مرحباً بك في التطبيق الرسمي لنادي الرجاء الرياضي! <br> 
            اختر طريقة الدخول للمتابعة.
        </div>

        <div class="btn-group">
            <button class="btn" onclick="alert('جارٍ الانتقال إلى صفحة دخول اللاعبين...')">دخول كلاعب</button>
            <button class="btn btn-secondary" onclick="alert('جارٍ الانتقال إلى صفحة دخول المشجعين...')">دخول كمشجع</button>
        </div>
    </div>

</body>
</html>
