<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة - Al-Rajaa Club</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 2px solid #3b82f6;
        }

        h1, h2 {
            color: #3b82f6;
            margin-bottom: 20px;
            text-align: center;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
        }

        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            color: #ffffff;
            outline: none;
        }

        .input-group textarea {
            height: 80px;
        }

        .btn {
            background-color: #3b82f6;
            color: #ffffff;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .btn-danger {
            background-color: #ef4444;
            color: #ffffff;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-danger:hover {
            background-color: #b91c1c;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            margin-top: 10px;
            width: 100%;
        }

        .btn-secondary:hover {
            background-color: #334155;
            color: #ffffff;
        }

        .player-list {
            margin-top: 20px;
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            font-size: 1.05rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .player-item img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #3b82f6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>لوحة تحكم الإدارة</h1>

        <div class="section">
            <h2>إضافة لاعب جديد</h2>
            <form onsubmit="addPlayer(event)">
                <div class="input-group">
                    <label for="newPlayerName">الاسم الثلاثي للاعب:</label>
                    <input type="text" id="newPlayerName" placeholder="مثال: احمد محمد علي" required>
                </div>
                <div class="input-group">
                    <label for="newPlayerBirth">سنة المواليد (أو تاريخ الميلاد):</label>
                    <input type="text" id="newPlayerBirth" placeholder="مثال: 2000 أو 15/05/2000" required>
                </div>
                <div class="input-group">
                    <label for="newPlayerPosition">مركز اللعب:</label>
                    <select id="newPlayerPosition" required>
                        <option value="">اختر المركز...</option>
                        <option value="حارس مرمى">حارس مرمى</option>
                        <option value="دفاع">دفاع</option>
                        <option value="وسط">وسط</option>
                        <option value="هجوم">هجوم</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="newPlayerImage">اختر صورة اللاعب:</label>
                    <input type="file" id="newPlayerImage" accept="image/*" required>
                </div>
                <button type="submit" class="btn">إضافة اللاعب وتوليد الرمز</button>
            </form>
        </div>

        <div class="section">
            <h2>نشر إعلان للفريق</h2>
            <form onsubmit="publishNews(event)">
                <div class="input-group">
                    <label for="newsContent">نص الإعلان:</label>
                    <textarea id="newsContent" placeholder="اكتب التعليمات هنا..." required></textarea>
                </div>
                <button type="submit" class="btn">نشر الإعلان</button>
            </form>
        </div>

        <div>
            <h2>اللاعبون المسجلون</h2>
            <div class="player-list" id="playersList"></div>
        </div>

        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">العودة للرئيسية</button>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('clubPlayers')) || [
            { name: "احمد محمد علي", pass: "A123", birth: "2000", position: "وسط", image: "" }
        ];

        function generateShortPassword() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const randomLetter = letters.charAt(Math.floor(Math.random() * letters.length));
            const randomNumber = Math.floor(100 + Math.random() * 900); // 3 أرقام
            return randomLetter + randomNumber;
        }

        function addPlayer(event) {
            event.preventDefault();
            const name = document.getElementById('newPlayerName').value.trim();
            const birth = document.getElementById('newPlayerBirth').value.trim();
            const position = document.getElementById('newPlayerPosition').value;
            const imageInput = document.getElementById('newPlayerImage');
            
            const pass = generateShortPassword();

            if (imageInput.files && imageInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageData = e.target.result;
                    saveNewPlayer(name, pass, birth, position, imageData);
                };
                reader.readAsDataURL(imageInput.files[0]);
            } else {
                saveNewPlayer(name, pass, birth, position, "");
            }
        }

        function saveNewPlayer(name, pass, birth, position, image) {
            players.push({ name, pass, birth, position, image });
            localStorage.setItem('clubPlayers', JSON.stringify(players));
            updatePlayersList();
            
            document.getElementById('newPlayerName').value = '';
            document.getElementById('newPlayerBirth').value = '';
            document.getElementById('newPlayerPosition').value = '';
            document.getElementById('newPlayerImage').value = '';
            
            alert('تمت إضافة اللاعب بنجاح. رمز المرور الخاص به هو: ' + pass);
        }

        function deletePlayer(index) {
            const playerName = players[index].name;
            const confirmDelete = confirm('هل أنت متأكد من حذف اللاعب: ' + playerName + '؟');
            
            if (confirmDelete) {
                players.splice(index, 1);
                localStorage.setItem('clubPlayers', JSON.stringify(players));
                updatePlayersList();
                alert('تم حذف اللاعب ' + playerName + ' بنجاح.');
            }
        }

        function updatePlayersList() {
            const listContainer = document.getElementById('playersList');
            listContainer.innerHTML = '';
            
            if (players.length === 0) {
                listContainer.innerHTML = '<div class="player-item">لا يوجد لاعبين مضافين حالياً.</div>';
                return;
            }

            players.forEach((p, index) => {
                const item = document.createElement('div');
                item.className = 'player-item';
                
                let imgTag = p.image ? `<img src="${p.image}" alt="صورة اللاعب">` : 'لا توجد صورة';

                item.innerHTML = `
                    ${imgTag}
                    <span><strong>${p.name}</strong></span>
                    <span>${p.position}</span>
                    <span>مواليد: ${p.birth}</span>
                    <span>الرمز: <strong>${p.pass}</strong></span>
                    <button class="btn-danger" onclick="deletePlayer(${index})">حذف</button>
                `;
                
                listContainer.appendChild(item);
            });
        }

        function publishNews(event) {
            event.preventDefault();
            const content = document.getElementById('newsContent').value;
            localStorage.setItem('clubNews', content);
            alert('تم نشر الإعلان بنجاح!');
            document.getElementById('newsContent').value = '';
        }

        updatePlayersList();
    </script>
</body>
</html>
