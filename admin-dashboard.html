<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة - Al-Rajaa Club</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 2px solid #3b82f6;
        }

        h1, h2 {
            color: #3b82f6;
            margin-bottom: 20px;
            text-align: center;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            color: #ffffff;
            outline: none;
        }

        .input-group textarea {
            height: 80px;
        }

        .btn {
            background-color: #3b82f6;
            color: #ffffff;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .btn-danger {
            background-color: #ef4444;
            color: #ffffff;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-danger:hover {
            background-color: #b91c1c;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            margin-top: 10px;
            width: 100%;
        }

        .btn-secondary:hover {
            background-color: #334155;
            color: #ffffff;
        }

        .player-list {
            margin-top: 20px;
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            font-size: 1.1rem;
        }

        .player-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>لوحة تحكم الإدارة</h1>

        <div class="section">
            <h2>إضافة لاعب جديد</h2>
            <form onsubmit="addPlayer(event)">
                <div class="input-group">
                    <label for="newPlayerName">الاسم الثلاثي للاعب:</label>
                    <input type="text" id="newPlayerName" placeholder="مثال: احمد محمد علي" required>
                </div>
                <button type="submit" class="btn">إضافة اللاعب وتوليد الرمز</button>
            </form>
        </div>

        <div class="section">
            <h2>نشر إعلان للفريق</h2>
            <form onsubmit="publishNews(event)">
                <div class="input-group">
                    <label for="newsContent">نص الإعلان:</label>
                    <textarea id="newsContent" placeholder="اكتب التعليمات هنا..." required></textarea>
                </div>
                <button type="submit" class="btn">نشر الإعلان</button>
            </form>
        </div>

        <div>
            <h2>اللاعبون المسجلون</h2>
            <div class="player-list" id="playersList"></div>
        </div>

        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">العودة للرئيسية</button>
    </div>

    <script>
        // قراءة البيانات من الذاكرة
        let players = JSON.parse(localStorage.getItem('clubPlayers')) || [
            { name: "احمد محمد علي", pass: "A123" }
        ];

        // دالة توليد الرمز بدون شارحة (حرف إنجليزي + 3 أرقام: مثال R742)
        function generateShortPassword() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const randomLetter = letters.charAt(Math.floor(Math.random() * letters.length));
            const randomNumber = Math.floor(100 + Math.random() * 900); // 3 أرقام
            return randomLetter + randomNumber;
        }

        function addPlayer(event) {
            event.preventDefault();
            const name = document.getElementById('newPlayerName').value.trim();
            const pass = generateShortPassword();
            
            players.push({ name, pass });
            localStorage.setItem('clubPlayers', JSON.stringify(players));
            
            updatePlayersList();
            
            document.getElementById('newPlayerName').value = '';
            alert('تمت إضافة اللاعب بنجاح. رمز المرور الخاص باللاعب هو: ' + pass);
        }

        // دالة لحذف اللاعب
        function deletePlayer(index) {
            const playerName = players[index].name;
            
            // تأكيد الحذف
            const confirmDelete = confirm('هل أنت متأكد من حذف اللاعب: ' + playerName + '؟');
            
            if (confirmDelete) {
                // إزالة اللاعب من القائمة
                players.splice(index, 1);
                
                // تحديث الذاكرة المحلية
                localStorage.setItem('clubPlayers', JSON.stringify(players));
                
                // تحديث القائمة المعروضة
                updatePlayersList();
                
                alert('تم حذف اللاعب ' + playerName + ' بنجاح.');
            }
        }

        function updatePlayersList() {
            const listContainer = document.getElementById('playersList');
            listContainer.innerHTML = '';
            
            if (players.length === 0) {
                listContainer.innerHTML = '<div class="player-item">لا يوجد لاعبين مضافين حالياً.</div>';
                return;
            }

            players.forEach((p, index) => {
                const item = document.createElement('div');
                item.className = 'player-item';
                
                // تم إضافة زر حذف بجانب اسم اللاعب وكلمة المرور
                item.innerHTML = `
                    <span><strong>${p.name}</strong></span> 
                    <span>الرمز: <strong>${p.pass}</strong></span>
                    <button class="btn-danger" onclick="deletePlayer(${index})">حذف</button>
                `;
                
                listContainer.appendChild(item);
            });
        }

        function publishNews(event) {
            event.preventDefault();
            const content = document.getElementById('newsContent').value;
            localStorage.setItem('clubNews', content);
            alert('تم نشر الإعلان بنجاح!');
            document.getElementById('newsContent').value = '';
        }

        // تحديث القائمة عند تحميل الصفحة
        updatePlayersList();
    </script>
</body>
</html>
