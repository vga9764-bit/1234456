<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة - Al-Rajaa Club</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 2px solid #3b82f6;
        }

        h1, h2 {
            color: #3b82f6;
            margin-bottom: 20px;
            text-align: center;
        }

        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            color: #ffffff;
            outline: none;
        }

        .input-group textarea {
            height: 80px;
        }

        .btn {
            background-color: #3b82f6;
            color: #ffffff;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #1d4ed8;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background-color: #334155;
            color: #ffffff;
        }

        /* مربع إظهار الرمز */
        .generated-code-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #0f172a;
            border: 2px dashed #10b981;
            border-radius: 6px;
            text-align: center;
            font-size: 1.3rem;
            color: #10b981;
            display: none; /* يكون مخفياً حتى تولد الرمز */
        }

        .player-list {
            margin-top: 20px;
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

        .player-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>لوحة تحكم الإدارة</h1>

        <div class="section">
            <h2>إضافة لاعب وتوليد كلمة مرور تلقائية</h2>
            <form onsubmit="addPlayer(event)">
                <div class="input-group">
                    <label for="newPlayerName">الاسم الثلاثي للاعب:</label>
                    <input type="text" id="newPlayerName" placeholder="مثال: احمد محمد علي" required>
                </div>
                <button type="submit" class="btn">إضافة اللاعب وتوليد الرمز</button>
            </form>

            <div id="generatedPassBox" class="generated-code-box">
                تم توليد الرمز للاعب الجديد: <strong id="generatedPassText"></strong>
            </div>
        </div>

        <div class="section">
            <h2>نشر إعلان للفريق</h2>
            <form onsubmit="publishNews(event)">
                <div class="input-group">
                    <label for="newsContent">نص الإعلان:</label>
                    <textarea id="newsContent" placeholder="اكتب التعليمات هنا..." required></textarea>
                </div>
                <button type="submit" class="btn">نشر الإعلان</button>
            </form>
        </div>

        <div>
            <h2>اللاعبون المسجلون</h2>
            <div class="player-list" id="playersList"></div>
        </div>

        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">العودة للرئيسية</button>
    </div>

    <script>
        let players = [
            { name: "احمد محمد علي", pass: "A123" }
        ];

        function generateCustomPassword() {
            // اختيار حرف عشوائي واحد
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const randomLetter = letters.charAt(Math.floor(Math.random() * letters.length));
            
            // اختيار 3 أرقام عشوائية
            const randomNumber = Math.floor(100 + Math.random() * 900); // يضمن أنه يتكون من 3 أرقام (مثال: 582)
            
            // الدمج (حرف + 3 أرقام)
            return randomLetter + randomNumber;
        }

        function addPlayer(event) {
            event.preventDefault();
            const name = document.getElementById('newPlayerName').value;
            const pass = generateCustomPassword(); // توليد تلقائي (حرف + 3 أرقام)
            
            // إضافة اللاعب لقاعدة البيانات الوهمية
            players.push({ name, pass });
            updatePlayersList();
            
            // إظهار المربع الذي يحتوي على الرمز للإدارة
            const passBox = document.getElementById('generatedPassBox');
            const passText = document.getElementById('generatedPassText');
            
            passText.textContent = pass;
            passBox.style.display = 'block'; // إظهار المربع على الشاشة

            document.getElementById('newPlayerName').value = '';
        }

        function updatePlayersList() {
            const listContainer = document.getElementById('playersList');
            listContainer.innerHTML = '';
            players.forEach(p => {
                const item = document.createElement('div');
                item.className = 'player-item';
                item.innerHTML = `<span><strong>${p.name}</strong> - كلمة المرور: <span>${p.pass}</span></span>`;
                listContainer.appendChild(item);
            });
        }

        function publishNews(event) {
            event.preventDefault();
            const content = document.getElementById('newsContent').value;
            localStorage.setItem('clubNews', content);
            alert('تم نشر الإعلان بنجاح!');
            document.getElementById('newsContent').value = '';
        }

        updatePlayersList();
    </script>
</body>
</html>
