<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المشجعين - Al-Rajaa Club</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: #1e293b;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 2px solid #0ea5e9;
            text-align: center;
        }

        .logo-area img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #0ea5e9;
            background-color: #ffffff;
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            color: #0ea5e9;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .section {
            margin-top: 30px;
            text-align: right;
        }

        h2 {
            color: #38bdf8;
            font-size: 1.3rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .news-box {
            background-color: #0c4a6e;
            padding: 20px;
            border-radius: 12px;
            border-right: 5px solid #0ea5e9;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #f1f5f9;
        }

        .player-card {
            background-color: #0f172a;
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #334155;
            gap: 15px;
        }

        .player-card img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #0ea5e9;
        }

        .player-info h4 {
            color: #f8fafc;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .player-info p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .player-stats {
            margin-top: 5px;
            color: #fbbf24;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .btn {
            background-color: #0ea5e9;
            color: #ffffff;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #0284c7;
        }

        .no-data {
            color: #94a3b8;
            text-align: center;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <img src="icon-192.png" alt="شعار النادي">
        </div>
        
        <h1>Al-Rajaa Club</h1>
        <p style="color: #94a3b8;">مرحباً بك في صفحة المشجعين</p>

        <div class="section">
            <h2>أخبار النادي وإعلانات الإدارة</h2>
            <div id="newsDisplay" class="news-box">
                لا توجد أخبار جديدة حالياً.
            </div>
        </div>

        <div class="section">
            <h2>قائمة لاعبي الفريق</h2>
            <div id="fanPlayersList"></div>
        </div>

        <button class="btn" onclick="window.location.href='index.html'">تسجيل خروج</button>
    </div>

    <script>
        window.onload = function() {
            // عرض الأخبار
            const storedNews = localStorage.getItem('clubNews');
            if (storedNews) {
                document.getElementById('newsDisplay').innerText = storedNews;
            }

            // عرض اللاعبين
            const storedPlayers = localStorage.getItem('clubPlayers');
            const listContainer = document.getElementById('fanPlayersList');

            if (storedPlayers) {
                const players = JSON.parse(storedPlayers);
                if (players.length === 0) {
                    listContainer.innerHTML = '<p class="no-data">لم يتم تسجيل لاعبين في القائمة بعد.</p>';
                } else {
                    listContainer.innerHTML = '';
                    players.forEach(p => {
                        const card = document.createElement('div');
                        card.className = 'player-card';
                        let imgUrl = p.image || 'https://via.placeholder.com/60';
                        card.innerHTML = `
                            <img src="${imgUrl}" alt="لاعب">
                            <div class="player-info">
                                <h4>${p.name}</h4>
                                <p>المركز: ${p.position || 'غير محدد'}</p>
                                <div class="player-stats">
                                    أهداف: ${p.goals || 0} | مباريات: ${p.matches || 0} | التقييم: ${p.rating || 0}/10
                                </div>
                            </div>
                        `;
                        listContainer.appendChild(card);
                    });
                }
            } else {
                listContainer.innerHTML = '<p class="no-data">قائمة اللاعبين غير متوفرة.</p>';
            }
        };
    </script>
</body>
</html>
