<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الإدارة - Al-Rajaa Club</title>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 350px;
            text-align: center;
            border: 2px solid #3b82f6;
        }
        h2 {
            color: #3b82f6;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background-color: #0f172a;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            color: #ffffff;
            box-sizing: border-box;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>دخول الإدارة</h2>
        <form onsubmit="checkAdmin(event)">
            <input type="password" id="adminPass" placeholder="أدخل رمز الإدارة" required>
            <button type="submit">دخول</button>
            <button type="button" style="background-color: #475569;" onclick="window.location.href='index.html'">العودة للرئيسية</button>
        </form>
    </div>

    <script>
        function checkAdmin(event) {
            event.preventDefault();
            const pass = document.getElementById('adminPass').value;
            
            // ----------------------------------------
            // اكتب هنا الرمز السري الجديد الذي تريده داخل علامتي الاقتباس
            // ----------------------------------------
            const myPassword = "azooz368549299009"; 
            
            if (pass === myPassword) {
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('رمز الدخول غير صحيح!');
            }
        }
    </script>
</body>
</html>
