<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول اللاعبين - Al-Rajaa Club</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background-color: #1e293b; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 2px solid #3b82f6; }
        h2 { color: #3b82f6; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { color: #94a3b8; display: block; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px; background-color: #0f172a; border: 1px solid #3b82f6; border-radius: 6px; color: #ffffff; outline: none; }
        .btn { background-color: #3b82f6; color: #ffffff; padding: 12px; border: none; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>دخول اللاعبين</h2>
        <form id="loginForm" onsubmit="checkPlayerLogin(event)">
            <div class="input-group">
                <label>الاسم الثلاثي:</label>
                <input type="text" id="playerName" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">تسجيل الدخول</button>
            <button type="button" class="btn" style="background-color: #475569;" onclick="window.location.href='index.html'">العودة</button>
        </form>
    </div>
    <script>
        function checkPlayerLogin(event) {
            event.preventDefault();
            alert('تم تسجيل الدخول بنجاح!'); // هنا يتم التحقق مستقبلاً
        }
    </script>
</body>
</html>
