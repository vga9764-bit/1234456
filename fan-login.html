<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول المشجعين - Al-Rajaa Club</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border: 2px solid #0ea5e9;
        }

        .logo-area img {
            width: 90px;
            height: 90px;
            margin-bottom: 20px;
            border-radius: 50%;
            border: 2px solid #0ea5e9;
            background-color: #ffffff;
            object-fit: cover;
        }

        h2 {
            color: #0ea5e9;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #0ea5e9;
            border-radius: 6px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            background-color: #0ea5e9;
            color: #ffffff;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #0284c7;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
        }

        .btn-secondary:hover {
            background-color: #334155;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <img src="icon-192.png" alt="شعار النادي">
        </div>

        <h2>دخول المشجعين</h2>

        <form id="fanLoginForm" onsubmit="saveFanAndRedirect(event)">
            <div class="input-group">
                <label for="fanName">اسم المشجع الثلاثي:</label>
                <input type="text" id="fanName" placeholder="أدخل اسمك هنا" required>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn">دخول</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">العودة للرئيسية</button>
            </div>
        </form>
    </div>

    <script>
        // التحقق إذا كان المشجع مسجلاً مسبقاً عند فتح الصفحة
        if (localStorage.getItem('currentFan')) {
            window.location.href = 'fan-dashboard.html';
        }

        function saveFanAndRedirect(event) {
            event.preventDefault();
            
            const name = document.getElementById('fanName').value.trim();
            
            // 1. حفظ المشجع الحالي
            localStorage.setItem('currentFan', name);
            
            // 2. إضافته لقائمة المشجعين الإجمالية
            let fansList = JSON.parse(localStorage.getItem('clubFans')) || [];
            fansList.push({ name: name, joinedDate: new Date().toLocaleDateString() });
            localStorage.setItem('clubFans', JSON.stringify(fansList));
            
            alert('أهلاً بك يا مشجعنا! تم تسجيل دخولك بنجاح.');
            window.location.href = 'fan-dashboard.html';
        }
    </script>
</body>
</html>
